# ==============================================================================
# TMUX CONFIG — DOCUMENTADO
# Arquivo: ~/.config/tmux/tmux.conf
# Prefix (leader): Ctrl+a
# ==============================================================================
#
# REFERÊNCIA RÁPIDA DE NOMENCLATURA:
#   session  → conjunto de janelas (context de trabalho, ex: "projeto-x")
#   window   → aba/tab dentro da sessão
#   pane     → divisão dentro de uma janela
#
# NOTAÇÃO USADA ABAIXO:
#   C-a      → Ctrl+a  (o prefix/leader)
#   M-x      → Alt+x   (sem precisar do prefix)
#   C-a , x  → pressionar Ctrl+a, soltar, depois pressionar x
#
# ==============================================================================
# ÍNDICE DE ATALHOS
# ==============================================================================
#
# [GERAL]
#   C-a r           → Recarregar este arquivo de configuração
#
# [PAINÉIS — divisões dentro de uma janela]
#   C-a s           → Dividir painel lado a lado (esquerda/direita)
#   C-a v           → Dividir painel empilhado (cima/baixo)
#   C-a q           → Fechar painel atual (sem confirmação)
#   C-a x           → Fechar painel atual (com confirmação)
#   C-a z           → Zoom no painel atual (toggle fullscreen)
#   C-a Space       → Alternar entre layouts automáticos
#   M-h / M-l       → Navegar para painel esquerdo / direito (Alt, sem prefix)
#   M-j / M-k       → Navegar para painel abaixo / acima   (Alt, sem prefix)
#   C-a H / C-a L   → Redimensionar painel para esquerda / direita (5 cols)
#   C-a J / C-a K   → Redimensionar painel para baixo / cima (5 linhas)
#
# [JANELAS — abas da sessão]
#   C-a c           → Nova janela (abre no diretório atual)
#   C-a ,           → Renomear janela atual
#   C-a &           → Fechar janela atual (com confirmação)
#   C-a n           → Ir para próxima janela
#   C-a p           → Ir para janela anterior
#   C-a 1..9        → Ir diretamente para janela 1–9
#
# [SESSÕES]
#   C-a $           → Renomear sessão atual        (padrão do tmux, não alterado)
#   C-a (           → Ir para sessão anterior      (padrão do tmux)
#   C-a )           → Ir para próxima sessão       (padrão do tmux)
#   C-a d           → Desanexar (detach) da sessão (padrão do tmux)
#   C-a s           → Listar sessões interativamente ← CONFLITO! ver nota [1]
#   tmux ls         → Listar sessões (no terminal)
#   tmux new -s nome → Nova sessão com nome (no terminal)
#   tmux attach -t nome → Reanexar em sessão (no terminal)
#
# [COPY MODE — copiar texto do histórico]
#   C-a [           → Entrar em copy mode (navegação estilo Vim)
#   v               → (em copy mode) Iniciar seleção visual
#   y               → (em copy mode) Copiar seleção → wl-copy (Wayland)
#   Escape          → (em copy mode) Cancelar / sair
#   hjkl, Ctrl+u/d → (em copy mode) Navegar (padrão Vim)
#
# [1] NOTA SOBRE CONFLITO:
#   "C-a s" está mapeado aqui como split horizontal, mas o tmux por padrão usa
#   "C-a s" para listar sessões. Para listar sessões interativamente, use
#   o terminal: `tmux ls` ou adicione um bind separado (ex: C-a S maiúsculo).
#
# ==============================================================================


# ==============================================================================
# CONFIGURAÇÃO BÁSICA
# ==============================================================================

# Mudar prefix de Ctrl+b para Ctrl+a (mais ergonômico, estilo GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # Ctrl+a Ctrl+a → envia Ctrl+a literal ao programa

# Recarregar config sem reiniciar tmux
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Config recarregado!"

# Indexar janelas e painéis a partir de 1 (mais intuitivo no teclado)
set -g base-index 1
setw -g pane-base-index 1

# Renumerar janelas automaticamente ao fechar uma (evita buracos: 1, 3, 4...)
set -g renumber-windows on

# Histórico de scroll aumentado
set -g history-limit 10000

# Suporte a mouse: scroll, resize de painéis, clique para selecionar painel/janela
set -g mouse on

# Tempo de espera ao pressionar ESC — 0ms é essencial para Vim/Neovim
# (sem isso, ESC dentro do Vim tem delay perceptível)
set -sg escape-time 0


# ==============================================================================
# CORES E TERMINAL
# ==============================================================================

# 256 cores + True Color (necessário para temas como Catppuccin no Neovim)
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Status bar no topo (altere para "bottom" se preferir)
set -g status-position top

# Status bar atualiza a cada 1 segundo (necessário para relógio em tempo real)
set -g status-interval 1


# ==============================================================================
# KEYBINDINGS — PAINÉIS
# ==============================================================================

# Remover binds padrão de split (para evitar conflito)
unbind '"'    # era split vertical padrão
unbind %      # era split horizontal padrão

# Dividir painel lado a lado (esquerda/direita) — lembrete: 's' de "side by side"
# -h = horizontal split = dois painéis lado a lado | herdando diretório atual
bind s split-window -h -c "#{pane_current_path}"

# Dividir painel empilhado (cima/baixo) — lembrete: 'v' de "vertical stack"
# -v = vertical split = dois painéis um sobre o outro | herdando diretório atual
bind v split-window -v -c "#{pane_current_path}"

# Fechar painel — 'q' sem confirmação (rápido), 'x' com confirmação (seguro)
bind q kill-pane
bind x confirm-before -p "Fechar painel? (y/n)" kill-pane

# Navegar entre painéis com Alt+hjkl (SEM precisar do prefix — muito mais rápido)
# Ideal para alternar rapidamente entre editor e terminal
bind -n M-h select-pane -L    # Alt+h → painel à esquerda
bind -n M-j select-pane -D    # Alt+j → painel abaixo
bind -n M-k select-pane -U    # Alt+k → painel acima
bind -n M-l select-pane -R    # Alt+l → painel à direita

# Redimensionar painéis com Prefix + Shift+HJKL
# -r = repetível (pode segurar a tecla) | incremento de 5 células por vez
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom no painel atual (toggle: fullscreen / volta ao normal)
bind z resize-pane -Z

# Alternar entre layouts automáticos do tmux:
# even-horizontal, even-vertical, main-horizontal, main-vertical, tiled
bind Space next-layout


# ==============================================================================
# KEYBINDINGS — JANELAS (abas)
# ==============================================================================

# Nova janela herdando o diretório do painel atual
bind c new-window -c "#{pane_current_path}"

# Renomear janela atual — lembrete: é a vírgula ","
bind , command-prompt -I "#W" "rename-window '%%'"

# Fechar janela com confirmação
bind & confirm-before -p "Fechar janela? (y/n)" kill-window

# Navegar entre janelas
bind n next-window
bind p previous-window

# Ir diretamente para janela pelo número
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9


# ==============================================================================
# KEYBINDINGS — SESSÕES
# ==============================================================================

# Renomear sessão atual (padrão do tmux mantido: C-a $)
# Listar/alternar sessões interativamente — bind separado pois 's' está ocupado
bind S choose-session           # C-a S (maiúsculo) → abre seletor de sessões

# Nova sessão (pede nome via prompt)
bind N command-prompt -p "Nome da nova sessão:" "new-session -s '%%'"

# Matar sessão atual com confirmação
bind K confirm-before -p "Matar sessão '#{session_name}'? (y/n)" kill-session


# ==============================================================================
# COPY MODE — estilo Vim
# ==============================================================================

# Ativar navegação Vim no copy mode
setw -g mode-keys vi

# Entrar em copy mode (para rolar e copiar texto do histórico)
bind [ copy-mode

# Dentro do copy mode:
bind -T copy-mode-vi v     send -X begin-selection          # v → iniciar seleção
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "wl-copy"  # y → copiar (Wayland)
bind -T copy-mode-vi Escape send -X cancel                  # Esc → sair

# NOTA: 'wl-copy' é para Wayland (ex: Hyprland, GNOME Wayland, KDE Wayland)
# Se usar X11, substitua por: xclip -in -selection clipboard
# Se usar macOS, substitua por: pbcopy


# ==============================================================================
# TEMA TOKYO NIGHT
# ==============================================================================

# Paleta de cores Tokyo Night
thm_bg="#1a1b26"
thm_bg_dark="#16161e"
thm_bg_hl="#292e42"
thm_border="#3b4261"
thm_fg="#c0caf5"
thm_fg_dim="#a9b1d6"
thm_comment="#565f89"
thm_blue="#7aa2f7"
thm_cyan="#7dcfff"
thm_green="#9ece6a"
thm_teal="#73daca"
thm_yellow="#e0af68"
thm_orange="#ff9e64"
thm_red="#f7768e"
thm_magenta="#bb9af7"
thm_purple="#9d7cd8"

# Fundo e texto geral da status bar
set -g status-style "bg=${thm_bg_dark},fg=${thm_fg_dim}"

# Janela ativa (em destaque)
setw -g window-status-current-style  "bg=${thm_blue},fg=${thm_bg_dark},bold"
setw -g window-status-current-format " #I:#W "

# Janelas inativas
setw -g window-status-style  "bg=${thm_bg_hl},fg=${thm_comment}"
setw -g window-status-format " #I:#W "

# Status bar esquerda: nome da sessão
set -g status-left  "#[bg=${thm_teal},fg=${thm_bg_dark},bold] #S #[bg=${thm_bg_dark}] "
set -g status-left-length 50

# Status bar direita: data e hora
set -g status-right "#[bg=${thm_bg_hl},fg=${thm_fg_dim}] %d/%m/%Y #[bg=${thm_blue},fg=${thm_bg_dark},bold] %H:%M:%S "
set -g status-right-length 50


# ==============================================================================
# PLUGINS (TPM)
# ==============================================================================
# Dentro do tmux: C-a I para instalar, C-a U para atualizar, C-a Alt+u para remover não usados
 
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
 
# tmux-resurrect: salvar e restaurar sessões manualmente
# C-a Ctrl+s → salvar | C-a Ctrl+r → restaurar
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'      # restaurar sessões do Neovim
set -g @resurrect-capture-pane-contents 'on'   # salvar conteúdo dos painéis
 
# tmux-continuum: auto-save contínuo das sessões
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'                 # restaurar ao iniciar tmux
set -g @continuum-save-interval '15'           # salvar a cada 15 minutos
 
# IMPORTANTE: esta linha DEVE ser a última do arquivo
run '~/.config/tmux/plugins/tpm/tpm'
